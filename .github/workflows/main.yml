name: Mirror MRS Rule Sets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest
        run: git pull

      - name: Create ruleset dir
        run: mkdir -p ruleset

      # ── MetaCubeX / meta-rules-dat ──────────────────────────────────────────
      - name: Download MetaCubeX geosite + geoip
        run: |
          BASE_GS="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite"
          BASE_GI="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip"

          dl() { curl -fsSL "$1" -o "ruleset/$2" && echo "OK  $2" || echo "FAIL $2"; }

          dl "$BASE_GS/amazon.mrs"            amazon-domain.mrs
          dl "$BASE_GS/category-ai-%21cn.mrs" category-ai-domain.mrs
          dl "$BASE_GS/cloudflare.mrs"        cloudflare-domain.mrs
          dl "$BASE_GS/discord.mrs"           discord-domain.mrs
          dl "$BASE_GS/github.mrs"            github-geosite.mrs
          dl "$BASE_GS/google-deepmind.mrs"   google-deepmind-domain.mrs
          dl "$BASE_GS/meta.mrs"              meta-domain.mrs
          dl "$BASE_GS/netflix.mrs"           netflix-domain.mrs
          dl "$BASE_GS/reddit.mrs"            reddit-domain.mrs
          dl "$BASE_GS/spotify.mrs"           spotify-domain.mrs
          dl "$BASE_GS/telegram.mrs"          telegram-domain.mrs
          dl "$BASE_GS/twitch.mrs"            twitch-domain.mrs
          dl "$BASE_GS/youtube.mrs"           youtube-domain.mrs

          dl "$BASE_GI/netflix.mrs"           netflix-ip.mrs

      # ── zxc-rv / zkeenip-rulesets (GitHub Releases) ─────────────────────────
      - name: Download zkeenip-rulesets
        run: |
          BASE="https://github.com/zxc-rv/zkeenip-rulesets/releases/latest/download"

          dl() { curl -fsSL -L "$1" -o "ruleset/$2" && echo "OK  $2" || echo "FAIL $2"; }

          dl "$BASE/amazon@ipcidr.mrs"     amazon-ip.mrs
          dl "$BASE/cloudflare@ipcidr.mrs" cloudflare-ip.mrs
          dl "$BASE/meta@ipcidr.mrs"       meta-ip.mrs
          dl "$BASE/telegram@ipcidr.mrs"   telegram-ip.mrs
          dl "$BASE/vodafone@ipcidr.mrs"   vodafone-ip.mrs

      # ── ssc.magickvn.com ────────────────────────────────────────────────────
      - name: Download ssc.magickvn.com
        run: |
          BASE="https://ssc.magickvn.com/mrs"

          dl() { curl -fsSL "$1" -o "ruleset/$2" && echo "OK  $2" || echo "FAIL $2"; }

          dl "$BASE/aws-ip.mrs"                   aws-ip.mrs
          dl "$BASE/battlefield-ip.mrs"           battlefield-ip.mrs
          dl "$BASE/googlemeet-ip.mrs"            googlemeet-ip.mrs
          dl "$BASE/inline-blocked-ips.mrs"       inline-blocked-ips.mrs
          dl "$BASE/lookup-domains.mrs"           lookup-domains.mrs
          dl "$BASE/music.mrs"                    music-domain.mrs
          dl "$BASE/roblox-domains.mrs"           roblox-domain.mrs
          dl "$BASE/roblox-ip.mrs"                roblox-ip.mrs
          dl "$BASE/ru-inline-banned-domains.mrs"  ru-inline-banned-domains.mrs
          dl "$BASE/ru-inline-banned.mrs"         ru-inline-banned.mrs
          dl "$BASE/ru-inline-domains.mrs"        ru-inline-domains.mrs

      # ── legiz-ru / mihomo-rule-sets ─────────────────────────────────────────
      - name: Download legiz-ru rule-sets
        run: |
          BASE="https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/main"

          dl() { curl -fsSL "$1" -o "ruleset/$2" && echo "OK  $2" || echo "FAIL $2"; }

          dl "$BASE/other/discord-voice-ip-list.mrs" discord-ip.mrs
          dl "$BASE/oisd/big.mrs"                    oisd-big-domain.mrs
          dl "$BASE/re-filter/domain-rule.mrs"       refilter-domain.mrs
          dl "$BASE/other/torrent-trackers.mrs"      torrent-trackers.mrs
          dl "$BASE/other/torrent-websites.mrs"      torrent-websites.mrs

      # ── hydraponique / roscomvpn-geosite ────────────────────────────────────
      - name: Download roscomvpn-geosite
        run: |
          dl() { curl -fsSL -L "$1" -o "ruleset/$2" && echo "OK  $2" || echo "FAIL $2"; }

          dl "https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/twitch-ads.mrs" twitch-ads-domain.mrs
          dl "https://github.com/hydraponique/roscomvpn-geosite/raw/master/release/mihomo/win-spy.mrs"  winspy-geosite.mrs

      # ── Проверка: сколько файлов скачалось ──────────────────────────────────
      - name: Verify downloads
        run: |
          echo "=== Downloaded files ==="
          ls -lh ruleset/
          echo ""
          count=$(ls ruleset/*.mrs 2>/dev/null | wc -l)
          echo "Total: ${count} / 37 MRS files"
          [ "$count" -ge 30 ] || { echo "Too few files (${count}), aborting commit"; exit 1; }

      # ── Коммит ──────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add ruleset/
          DATE=$(TZ=Europe/Moscow date +'%Y-%m-%dT%H:%M:%S')
          git commit -m "Mirror rule-sets ${DATE}" || echo "Nothing to commit"
          git push
